# Deploys the interactive demo (index.html) to GitHub Pages. The demo imports
# the built library (dist/index.js), so the deploy runs `npm run build` first,
# then assembles the site from index.html plus dist/index.js. node_modules,
# the spec, and package metadata are intentionally not published.
#
# One-time setup: Settings → Pages → Source = "GitHub Actions".

name: Deploy demo

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'src/**'
      - 'tsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Assemble site
        run: |
          mkdir -p _site/dist
          cp index.html _site/
          cp dist/index.js _site/dist/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
