# Publishes to npm when a version tag (vX.Y.Z) is pushed. Pushing tag `v1.2.1`
# publishes version `1.2.1`: the leading 'v' is stripped and written into
# package.json before publishing. Authentication uses Trusted Publishing (OIDC)
# via the `id-token: write` permission — no long-lived npm token is needed.
# Configure the trusted publisher on npmjs.com (repo + workflow filename
# `npm-publish.yml` + optional environment). Docs: https://docs.npmjs.com/trusted-publishers/

name: Node.js Package

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: npm
      - run: npm ci
      - name: Set package version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$GITHUB_REF_NAME' is not a valid semver (expected vX.Y.Z)"
            exit 1
          fi
          echo "Publishing version $VERSION"
          npm version "$VERSION" --no-git-tag-version
      - run: npm run typecheck
      - run: npm run build
      - run: npm publish
