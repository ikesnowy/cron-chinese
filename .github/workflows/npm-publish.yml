# Publishes to npm on release creation via Trusted Publishing (OIDC).
# No long-lived npm token needed: authentication uses OIDC through the
# `id-token: write` permission, and npm CLI auto-detects the OIDC environment.
# Configure the trusted publisher on npmjs.com (repo + workflow filename
# `npm-publish.yml` + optional environment). Docs: https://docs.npmjs.com/trusted-publishers/

name: Node.js Package

on:
  release:
    types: [created]

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: npm
      - run: npm ci
      - run: npm publish
